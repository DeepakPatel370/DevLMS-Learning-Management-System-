<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - DevLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="animate-fade-in">

  <div class="wrapper">
    <nav class="sidebar">
      <div class="sidebar-header p-4 d-flex align-items-center justify-content-center">
        <div class="bg-primary p-2 rounded-lg me-2">
          <i class="fas fa-code text-white"></i>
        </div>
        <h3 class="fw-bold m-0" style="letter-spacing: -1px;">DevLMS</h3>
      </div>
      <ul class="list-unstyled components mt-4">
        <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="courses.html" class="active"><i class="fas fa-book"></i> Courses</a></li>
        <li><a href="editor.html"><i class="fas fa-laptop-code"></i> Code Practice</a></li>
        <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      </ul>
      <div class="p-4 mt-auto">
        <button class="btn btn-light w-100 rounded-pill border shadow-sm logout-btn">
          <i class="fas fa-sign-out-alt me-2"></i> Logout
        </button>
      </div>
    </nav>

    <div id="content" class="content p-4">
      <div class="d-flex justify-content-between align-items-center mb-5">
         <div>
            <h6 class="text-muted text-uppercase small fw-bold">Learning Path</h6>
            <h2 class="fw-bold m-0">Explore <span class="text-primary">Courses</span></h2>
         </div>
         <div class="d-flex gap-2">
            <input type="text" class="form-control rounded-pill px-4 border-0 shadow-sm" placeholder="Search courses..." id="course-search">
            <button class="btn btn-white rounded-circle shadow-sm"><i class="fas fa-filter"></i></button>
         </div>
      </div>
      
      <div class="row g-4" id="courses-grid">
        <!-- Courses injected via JS -->
        <div class="text-center w-100 py-5">
           <div class="spinner-grow text-primary" role="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    let allCourses = [];
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        allCourses = await api.get('/courses');
        renderCourses(allCourses);

        // Search logic
        const searchInput = document.getElementById('course-search');
        searchInput.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase();
          const filtered = allCourses.filter(c => 
            c.title.toLowerCase().includes(query) || 
            c.description.toLowerCase().includes(query)
          );
          renderCourses(filtered);
        });

      } catch (err) {
        document.getElementById('courses-grid').innerHTML = '<div class="col-12 text-danger">Failed to load courses.</div>';
      }
    });

    function renderCourses(courses) {
      const grid = document.getElementById('courses-grid');
      grid.innerHTML = '';
      
      if (courses.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">No courses found matching your search.</p></div>';
        return;
      }

      courses.forEach(course => {
        grid.innerHTML += `
          <div class="col-md-4 animate-fade-in">
            <div class="card h-100 border-0 course-card p-2">
              <div class="card-body text-center p-4">
                <div class="icon-wrapper mb-4 d-inline-block p-4 rounded-circle" style="background: rgba(99, 102, 241, 0.1);">
                  <img src="${course.thumbnail || 'https://cdn-icons-png.flaticon.com/512/732/732212.png'}" width="70" alt="${course.title}">
                </div>
                <h5 class="fw-bold mb-2">${course.title}</h5>
                <p class="text-muted small mb-4" style="height: 40px; overflow: hidden;">${course.description}</p>
                <div class="d-flex align-items-center justify-content-between pt-3 border-top mt-auto">
                  <span class="badge bg-light text-primary rounded-pill px-3 py-2">${course.category || 'Web Dev'}</span>
                  <a href="course-detail.html?id=${course._id}" class="btn btn-primary px-4 rounded-pill">Start Learning</a>
                </div>
              </div>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
