<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DevLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center pt-5">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg p-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">DevLMS</h2>
            <p class="text-muted">Welcome back! Please login to continue.</p>
          </div>
          
          <div id="alert-box"></div>

          <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">Login</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button">Register</button>
            </li>
          </ul>
          
          <div class="tab-content" id="pills-tabContent">
            <!-- Login Form -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label">Email or Mobile</label>
                  <input type="text" class="form-control" id="login-identifier" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                <div class="text-center mt-3">
                  <a href="#" class="text-muted small">Forgot password?</a>
                </div>
              </form>
            </div>
            
            <!-- Register Form -->
            <div class="tab-pane fade" id="pills-register" role="tabpanel">
              <form id="register-form">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="reg-name" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email address</label>
                  <input type="email" class="form-control" id="reg-email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Mobile Number</label>
                  <input type="tel" class="form-control" id="reg-mobile" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="reg-password" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-control" id="reg-confirm" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
