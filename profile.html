<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - DevLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .profile-avatar {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4361ee, #4cc9f0);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: white; font-weight: 700;
      margin: 0 auto 12px;
    }
    .info-badge {
      background: #f0f4ff;
      border-radius: 8px;
      padding: 10px 16px;
    }
    .info-badge label { font-size: 0.75rem; color: #888; margin-bottom: 2px; display: block; }
    .info-badge span { font-weight: 600; color: #333; }
  </style>
</head>
<body>

  <div class="wrapper">
    <nav class="sidebar bg-dark text-white">
      <div class="sidebar-header p-4 text-center">
        <h3 class="fw-bold text-primary"><i class="fas fa-code"></i> DevLMS</h3>
      </div>
      <ul class="list-unstyled components">
        <li><a href="dashboard.html"><i class="fas fa-chart-line me-2"></i> Dashboard</a></li>
        <li><a href="courses.html"><i class="fas fa-book me-2"></i> Courses</a></li>
        <li><a href="editor.html"><i class="fas fa-laptop-code me-2"></i> Code Practice</a></li>
        <li><a href="profile.html" class="active"><i class="fas fa-user me-2"></i> Profile</a></li>
      </ul>
    </nav>

    <div id="content" class="content bg-light w-100">
      <h3 class="fw-bold mb-4">My Profile</h3>

      <div id="alert-box"></div>

      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card shadow-sm border-0 p-4 mb-4">
            <div class="text-center mb-4">
              <div class="profile-avatar" id="avatar-initials">?</div>
              <h4 class="fw-bold mb-0" id="display-name">Loading...</h4>
              <p class="text-muted small" id="display-email">—</p>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-6">
                <div class="info-badge">
                  <label>Email (cannot change)</label>
                  <span id="info-email">—</span>
                </div>
              </div>
              <div class="col-6">
                <div class="info-badge">
                  <label>Member since</label>
                  <span id="info-joined">—</span>
                </div>
              </div>
            </div>

            <form id="profile-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Full Name</label>
                  <input type="text" class="form-control" id="pro-name" placeholder="Your full name" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Mobile Number</label>
                  <input type="tel" class="form-control" id="pro-mobile" placeholder="10-digit mobile" required>
                </div>
              </div>

              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary flex-grow-1" id="pro-save">
                  <i class="fas fa-save me-2"></i>Save Changes
                </button>
                <!-- Triggers Bootstrap modal instead of browser confirm() -->
                <button type="button" class="btn btn-outline-danger px-4" data-bs-toggle="modal" data-bs-target="#deleteModal">
                  <i class="fas fa-trash-alt me-2"></i>Delete Account
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Delete Account</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-4">
          <p class="mb-1">Are you sure you want to permanently delete your account?</p>
          <p class="text-danger fw-bold mb-0">⚠️ This will erase all your progress, quiz scores and code submissions. This cannot be undone.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-delete-btn">
            <i class="fas fa-trash-alt me-2"></i>Yes, Delete My Account
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    const showAlert = (msg, type = 'success') => {
      document.getElementById('alert-box').innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show">
          ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
    };

    document.addEventListener('DOMContentLoaded', async () => {
      if (!localStorage.getItem('token')) {
        window.location.href = 'login.html';
        return;
      }

      // Load user data
      try {
        const data = await api.get('/user/profile');
        if (data && data.user) {
          const u = data.user;
          const initials = u.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
          document.getElementById('avatar-initials').innerText = initials;
          document.getElementById('display-name').innerText = u.name;
          document.getElementById('display-email').innerText = u.email;
          document.getElementById('info-email').innerText = u.email;
          document.getElementById('info-joined').innerText = u.createdAt
            ? new Date(u.createdAt).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' })
            : '—';
          document.getElementById('pro-name').value = u.name;
          document.getElementById('pro-mobile').value = u.mobile;
        }
      } catch (err) {
        showAlert('Failed to load profile data.', 'danger');
      }

      // Save — only name and mobile
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pro-save');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
        btn.disabled = true;
        try {
          const res = await api.put('/user/profile', {
            name: document.getElementById('pro-name').value.trim(),
            mobile: document.getElementById('pro-mobile').value.trim()
          });
          if (res._id) {
            const initials = res.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('avatar-initials').innerText = initials;
            document.getElementById('display-name').innerText = res.name;
            showAlert('Profile updated successfully!', 'success');
          } else {
            showAlert(res.message || 'Update failed.', 'danger');
          }
        } catch (err) {
          showAlert('Server error. Please try again.', 'danger');
        } finally {
          btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Changes';
          btn.disabled = false;
        }
      });

      // Delete — confirmed via Bootstrap modal
      document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
        const btn = document.getElementById('confirm-delete-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Deleting...';
        btn.disabled = true;

        try {
          const res = await fetch('/api/user/profile', {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
          });
          const data = await res.json();

          if (res.ok) {
            localStorage.clear();
            // Close modal then redirect
            bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
            alert('✅ Your account has been permanently deleted.');
            window.location.href = 'index.html';
          } else {
            showAlert(data.message || 'Failed to delete account.', 'danger');
            btn.innerHTML = '<i class="fas fa-trash-alt me-2"></i>Yes, Delete My Account';
            btn.disabled = false;
          }
        } catch (err) {
          showAlert('Server error. Please try again.', 'danger');
          btn.innerHTML = '<i class="fas fa-trash-alt me-2"></i>Yes, Delete My Account';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
