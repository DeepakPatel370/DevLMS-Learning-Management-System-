<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - DevLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="animate-fade-in">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <a href="courses.html" class="btn btn-light rounded-pill px-3 shadow-sm"><i class="fas fa-arrow-left"></i> Exit</a>
          <div class="text-center">
             <span class="small text-muted text-uppercase fw-bold">Assessment</span>
             <h4 class="fw-bold m-0" id="quiz-title">Topic Quiz</h4>
          </div>
          <div class="badge bg-primary rounded-pill px-3 py-2">Question 1/X</div>
        </div>
        
        <div class="card border-0 glass p-1 min-vh-50">
          <div class="card-body p-4 p-md-5" id="quiz-container">
            <div class="text-center py-5" id="quiz-loading">
              <div class="spinner-grow text-primary" role="status"></div>
              <p class="mt-3 text-muted">Preparing assessment...</p>
            </div>
            
            <form id="quiz-form" style="display:none;">
              <div id="questions-wrapper"></div>
              <button type="submit" class="btn btn-primary btn-lg mt-4 w-100 rounded-pill shadow">Complete Assessment</button>
            </form>
          </div>

          <div class="card-body p-5 text-center animate-fade-in" id="result-container" style="display:none;">
             <div class="bg-success d-inline-block p-4 rounded-circle mb-4 shadow-sm">
                <i class="fas fa-trophy fa-3x text-white"></i>
             </div>
             <h2 class="fw-bold display-6 mb-2">Quiz Completed!</h2>
             <p class="text-muted mb-4">Great job on finishing the assessment. Your results are saved.</p>
             <div class="glass p-4 rounded-lg mb-4">
                <h1 class="fw-bold text-primary mb-0" id="score-text" style="font-size: 3rem;">0/0</h1>
                <p class="small text-muted text-uppercase fw-bold">Score Summary</p>
             </div>
             <div class="d-flex gap-2">
                <a href="dashboard.html" class="btn btn-primary btn-lg w-100 rounded-pill">Dashboard</a>
                <a href="courses.html" class="btn btn-outline-secondary btn-lg w-100 rounded-pill">Courses</a>
             </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const topicId = urlParams.get('topicId');
      if (!topicId) return window.location.href = 'courses.html';

      let currentQuiz = null;

      try {
        currentQuiz = await api.get(`/quizzes/${topicId}`);
        document.getElementById('quiz-loading').style.display = 'none';
        
        if (!currentQuiz || !currentQuiz.questions || currentQuiz.questions.length === 0) {
          document.getElementById('quiz-container').innerHTML = '<p class="text-center text-danger">No quiz found for this topic.</p>';
          return;
        }

        const wrapper = document.getElementById('questions-wrapper');
        const form = document.getElementById('quiz-form');
        form.style.display = 'block';

        const escapeHTML = (str) => {
          const p = document.createElement('p');
          p.textContent = str;
          return p.innerHTML;
        };

        currentQuiz.questions.forEach((q, qIndex) => {
          let optionsHtml = '';
          q.options.forEach((opt, oIndex) => {
             optionsHtml += `
              <label class="quiz-option" for="q_${qIndex}_opt_${oIndex}">
                <input type="radio" name="q_${qIndex}" id="q_${qIndex}_opt_${oIndex}" value="${oIndex}" required>
                <div class="d-flex align-items-center">
                  <div class="option-indicator me-3" style="width: 20px; height: 20px; border: 2px solid #adb5bd; border-radius: 50%;"></div>
                  <span class="fw-medium text-dark">${escapeHTML(opt)}</span>
                </div>
              </label>
             `;
          });

          wrapper.innerHTML += `
            <div class="mb-5 animate-fade-in">
              <div class="d-flex align-items-center mb-3">
                 <span class="badge bg-primary-subtle text-primary me-2 rounded-lg">Question ${qIndex + 1}</span>
              </div>
              <h4 class="fw-bold mb-4 text-dark">${escapeHTML(q.questionText)}</h4>
              <div class="options-grid">
                ${optionsHtml}
              </div>
            </div>
          `;
        });

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          let score = 0;

          currentQuiz.questions.forEach((q, qIndex) => {
            const selected = document.querySelector(`input[name="q_${qIndex}"]:checked`);
            if (selected && parseInt(selected.value) === q.correctOptionIndex) {
              score++;
            }
          });

          try {
            await api.post('/quizzes/submit', {
              quizId: currentQuiz._id,
              topicId: topicId,
              score: score,
              total: currentQuiz.questions.length
            });

            form.style.display = 'none';
            const resCont = document.getElementById('result-container');
            resCont.style.display = 'block';
            document.getElementById('score-text').innerText = `You scored ${score} out of ${currentQuiz.questions.length}`;

          } catch (err) {
            alert('Failed to save score!');
          }
        });

        // Add selection effect logic
        document.querySelectorAll('.quiz-option input').forEach(input => {
          input.addEventListener('change', (e) => {
            const name = e.target.getAttribute('name');
            document.querySelectorAll(`.quiz-option[for^="${name}"]`).forEach(opt => {
              opt.classList.remove('selected');
              opt.querySelector('.option-indicator').style.background = 'transparent';
              opt.querySelector('.option-indicator').style.borderColor = 'var(--border)';
            });
            const parent = e.target.closest('.quiz-option');
            parent.classList.add('selected');
            parent.querySelector('.option-indicator').style.background = 'var(--primary)';
            parent.querySelector('.option-indicator').style.borderColor = 'var(--primary)';
          });
        });

      } catch (err) {
        document.getElementById('quiz-loading').innerHTML = '<p class="text-danger">Failed to load quiz. It might not exist yet.</p>';
      }
    });
  </script>
</body>
</html>
