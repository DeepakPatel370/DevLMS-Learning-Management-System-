<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - DevLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="wrapper">
    <!-- Sidebar  -->
    <nav class="sidebar animate-fade-in">
      <div class="sidebar-header p-4 d-flex align-items-center justify-content-center">
        <div class="bg-primary p-2 rounded-lg me-2">
          <i class="fas fa-code text-white"></i>
        </div>
        <h3 class="fw-bold m-0" style="letter-spacing: -1px;">DevLMS</h3>
      </div>

      <ul class="list-unstyled components mt-4">
        <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="courses.html"><i class="fas fa-book"></i> Courses</a></li>
        <li><a href="editor.html"><i class="fas fa-laptop-code"></i> Code Practice</a></li>
        <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      </ul>
      <div class="p-4 mt-auto">
        <button class="btn btn-light w-100 rounded-pill border shadow-sm logout-btn">
          <i class="fas fa-sign-out-alt me-2"></i> Logout
        </button>
      </div>
    </nav>

    <!-- Page Content  -->
    <div id="content" class="content p-4 animate-fade-in">
      <nav class="navbar navbar-expand-lg rounded-pill px-4 mb-4 shadow-sm">
        <div class="container-fluid">
          <h4 class="mb-0">Welcome back, <span id="user-name-display" class="text-primary fw-bold">User</span>!</h4>
          <div class="ms-auto d-flex align-items-center">
            <button class="btn btn-light rounded-circle p-2 me-2"><i class="fas fa-bell"></i></button>
            <div class="vr mx-3"></div>
            <div class="bg-primary rounded-circle" style="width: 40px; height: 40px;"></div>
          </div>
        </div>
      </nav>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card p-4 border-0 glass h-100 border-start border-primary border-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h6 class="text-muted text-uppercase small fw-bold">Completed Topics</h6>
              <i class="fas fa-check-double text-primary"></i>
            </div>
            <h2 class="fw-bold mb-0" id="topics-count">0</h2>
            <div class="progress mt-3" style="height: 6px;">
              <div class="progress-bar bg-primary" style="width: 45%;"></div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-4 border-0 glass h-100 border-start border-success border-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h6 class="text-muted text-uppercase small fw-bold">Quiz Performance</h6>
              <i class="fas fa-bolt text-success"></i>
            </div>
            <h2 class="fw-bold mb-0" id="quiz-avg">0%</h2>
            <p class="small text-muted mb-0 mt-2">+5% from last week</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-4 border-0 glass h-100 border-start border-warning border-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h6 class="text-muted text-uppercase small fw-bold">Practice Hours</h6>
              <i class="fas fa-clock text-warning"></i>
            </div>
            <h2 class="fw-bold mb-0" id="code-count">0</h2>
            <p class="small text-muted mb-0 mt-2">Daily Goal: 2h</p>
          </div>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-md-12">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h5 class="card-title fw-bold mb-4">Recent Progress</h5>
              <div class="table-responsive">
                <table class="table" id="progress-table">
                  <thead>
                    <tr>
                      <th>Topic</th>
                      <th>Date</th>
                      <th>Progress</th>
                      <th>Score</th>
                    </tr>
                  </thead>
                  <tbody id="progress-list">
                    <tr><td colspan="3" class="text-center text-muted">No progress data available yet. Start a course!</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
